<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TOEIC Practice">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>TOEIC Practice</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --orange: #ea580c;
  --orange-light: #ffedd5;
  --yellow-light: #fef9c3;
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 16px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Screens */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ========== HOME ========== */
#screen-home { padding: 0 16px 40px; }

.home-header {
  text-align: center;
  padding: 32px 0 24px;
}

.app-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.app-subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 4px;
}

.btn-start-all {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--blue), #1d4ed8);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
  gap: 14px;
  transition: transform 0.15s;
}
.btn-start-all:active { transform: scale(0.98); }
.btn-icon { font-size: 22px; }
.btn-text { flex: 1; }
.btn-text strong { display: block; font-size: 17px; }
.btn-text small { opacity: 0.85; font-size: 13px; }
.btn-arrow { font-size: 24px; opacity: 0.7; }

.section-title {
  font-size: 18px;
  font-weight: 700;
  margin: 28px 0 14px;
}

.part-card {
  display: flex;
  align-items: center;
  padding: 16px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  cursor: pointer;
  gap: 14px;
  border: none;
  width: 100%;
  text-align: left;
  transition: transform 0.15s;
}
.part-card:active { transform: scale(0.98); }

.part-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--blue-light);
  color: var(--blue);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.part-info { flex: 1; }
.part-info strong { display: block; font-size: 15px; }
.part-info small { color: var(--text-secondary); font-size: 13px; }
.part-arrow { color: var(--text-secondary); font-size: 18px; }

.mini-quiz-row {
  display: flex;
  gap: 12px;
}

.mini-quiz-btn {
  flex: 1;
  padding: 20px 0;
  background: var(--card);
  border: none;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: pointer;
  text-align: center;
  transition: transform 0.15s;
}
.mini-quiz-btn:active { transform: scale(0.96); }
.mini-quiz-btn strong { display: block; font-size: 28px; color: var(--green); }
.mini-quiz-btn.orange strong { color: var(--orange); }
.mini-quiz-btn.red strong { color: var(--red); }
.mini-quiz-btn small { color: var(--text-secondary); font-size: 13px; }

/* ========== QUIZ ========== */
.progress-bar {
  height: 4px;
  background: var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

.progress-fill {
  height: 100%;
  background: var(--blue);
  transition: width 0.3s ease;
  width: 0%;
}

.quiz-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.quiz-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.badge {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 8px;
}

.badge-part { background: var(--blue-light); color: var(--blue); }
.badge-category { background: #f3f4f6; color: var(--text-secondary); }
.badge-difficulty.easy { background: var(--green-light); color: var(--green); }
.badge-difficulty.medium { background: var(--orange-light); color: var(--orange); }
.badge-difficulty.hard { background: var(--red-light); color: var(--red); }

.passage-area {
  font-size: 14px;
  line-height: 1.7;
  padding: 14px;
  background: #f9fafb;
  border-radius: 12px;
  margin-bottom: 16px;
  white-space: pre-wrap;
  display: none;
}
.passage-area.visible { display: block; }

.question-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.6;
  margin-bottom: 20px;
}

.choices { display: flex; flex-direction: column; gap: 10px; }

.choice-btn {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 14px 16px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  line-height: 1.5;
  text-align: left;
  transition: all 0.2s;
  gap: 10px;
}
.choice-btn:active { transform: scale(0.98); }

.choice-btn.correct {
  background: var(--green-light);
  border-color: var(--green);
  cursor: default;
}

.choice-btn.incorrect {
  background: var(--red-light);
  border-color: var(--red);
  cursor: default;
}

.choice-btn.dimmed {
  opacity: 0.5;
  cursor: default;
}

.choice-btn .choice-icon {
  margin-left: auto;
  font-size: 18px;
  flex-shrink: 0;
}

.quiz-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--card);
  border-top: 1px solid var(--border);
}

.btn-quit {
  background: none;
  border: none;
  color: var(--red);
  font-size: 14px;
  cursor: pointer;
  padding: 6px 12px;
}

.quiz-counter {
  color: var(--text-secondary);
  font-size: 14px;
}

/* ========== EXPLANATION ========== */
.result-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
}

.result-banner.correct {
  background: var(--green-light);
}

.result-banner.incorrect {
  background: var(--red-light);
}

.result-banner .banner-icon { font-size: 28px; }
.result-banner .banner-text strong {
  display: block;
  font-size: 20px;
}
.result-banner.correct .banner-text strong { color: var(--green); }
.result-banner.incorrect .banner-text strong { color: var(--red); }
.result-banner .banner-text small {
  color: var(--text-secondary);
  font-size: 13px;
}

.explanation-box {
  background: #fffbeb;
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 20px;
}

.explanation-header {
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 10px;
}

.explanation-box p {
  font-size: 15px;
  line-height: 1.7;
  color: #555;
}

.quiz-footer-next {
  padding: 12px 16px;
  background: var(--card);
  border-top: 1px solid var(--border);
}

.btn-next {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
}
.btn-next:active { transform: scale(0.98); }

/* ========== RESULT ========== */
#screen-result {
  padding: 0 16px;
  align-items: center;
}

.result-content {
  width: 100%;
  max-width: 400px;
  padding-top: 32px;
}

.score-circle {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto 20px;
}

.score-circle svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.score-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 10;
}

.score-ring {
  fill: none;
  stroke: var(--green);
  stroke-width: 10;
  stroke-linecap: round;
  stroke-dasharray: 326.7;
  stroke-dashoffset: 326.7;
  transition: stroke-dashoffset 1s ease, stroke 0.5s;
}

.score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.score-percent {
  display: block;
  font-size: 42px;
  font-weight: 800;
}

.score-fraction {
  display: block;
  font-size: 14px;
  color: var(--text-secondary);
}

.score-message {
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 24px;
}

.stats-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}

.stat-card {
  flex: 1;
  text-align: center;
  padding: 16px 8px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.stat-icon { font-size: 22px; margin-bottom: 4px; }
.stat-card.green .stat-icon { color: var(--green); }
.stat-card.red .stat-icon { color: var(--red); }
.stat-card.blue .stat-icon { color: var(--blue); }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

#part-breakdown {
  margin-bottom: 24px;
}

.part-breakdown-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
}

.part-result-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.part-result-row:last-child { border-bottom: none; }
.part-result-name { font-size: 14px; flex: 1; }
.part-result-score { font-size: 14px; font-weight: 600; color: var(--text-secondary); width: 50px; text-align: right; }

.part-result-bar {
  width: 80px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.part-result-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 40px;
}

.btn-retry {
  width: 100%;
  padding: 14px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-home {
  width: 100%;
  padding: 14px;
  background: var(--blue-light);
  color: var(--blue);
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-retry:active, .btn-home:active { transform: scale(0.98); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen.active { animation: fadeIn 0.25s ease; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="screen-home" class="screen active">
      <div class="home-header">
        <h1 class="app-title">TOEIC Practice</h1>
        <p class="app-subtitle">550問で実力チェック</p>
      </div>

      <button class="btn-start-all" onclick="startQuiz()">
        <span class="btn-icon">▶</span>
        <span class="btn-text">
          <strong>全問チャレンジ</strong>
          <small id="total-count"></small>
        </span>
        <span class="btn-arrow">›</span>
      </button>

      <h2 class="section-title">パート別学習</h2>
      <div id="part-cards"></div>

      <h2 class="section-title">ミニテスト</h2>
      <div class="mini-quiz-row">
        <button class="mini-quiz-btn" onclick="startQuiz(null, 10)">
          <strong>10</strong><small>問</small>
        </button>
        <button class="mini-quiz-btn orange" onclick="startQuiz(null, 25)">
          <strong>25</strong><small>問</small>
        </button>
        <button class="mini-quiz-btn red" onclick="startQuiz(null, 50)">
          <strong>50</strong><small>問</small>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <div class="quiz-content">
        <div class="quiz-badges">
          <span id="badge-part" class="badge badge-part"></span>
          <span id="badge-category" class="badge badge-category"></span>
          <span id="badge-difficulty" class="badge badge-difficulty"></span>
        </div>
        <div id="passage-area" class="passage-area"></div>
        <p id="question-text" class="question-text"></p>
        <div id="choices" class="choices"></div>
      </div>
      <div class="quiz-footer">
        <button class="btn-quit" onclick="confirmQuit()">終了</button>
        <span id="quiz-counter" class="quiz-counter"></span>
      </div>
    </div>

    <!-- Explanation Screen -->
    <div id="screen-explanation" class="screen">
      <div class="progress-bar"><div id="progress-fill-exp" class="progress-fill"></div></div>
      <div class="quiz-content">
        <div id="result-banner" class="result-banner"></div>
        <div id="exp-passage-area" class="passage-area"></div>
        <p id="exp-question-text" class="question-text"></p>
        <div id="exp-choices" class="choices"></div>
        <div id="explanation-box" class="explanation-box">
          <div class="explanation-header">💡 解説</div>
          <p id="explanation-text"></p>
        </div>
      </div>
      <div class="quiz-footer-next">
        <button id="btn-next" class="btn-next" onclick="nextQuestion()">次の問題へ</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
      <div class="result-content">
        <div class="score-circle">
          <svg viewBox="0 0 120 120">
            <circle class="score-bg" cx="60" cy="60" r="52"/>
            <circle id="score-ring" class="score-ring" cx="60" cy="60" r="52"/>
          </svg>
          <div class="score-text">
            <span id="score-percent" class="score-percent"></span>
            <span id="score-fraction" class="score-fraction"></span>
          </div>
        </div>
        <p id="score-message" class="score-message"></p>

        <div class="stats-row">
          <div class="stat-card green">
            <div class="stat-icon">✓</div>
            <div id="stat-correct" class="stat-value"></div>
            <div class="stat-label">正解数</div>
          </div>
          <div class="stat-card red">
            <div class="stat-icon">✗</div>
            <div id="stat-incorrect" class="stat-value"></div>
            <div class="stat-label">不正解数</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-icon">%</div>
            <div id="stat-rate" class="stat-value"></div>
            <div class="stat-label">正答率</div>
          </div>
        </div>

        <div id="part-breakdown"></div>

        <div class="result-actions">
          <button class="btn-retry" onclick="retryQuiz()">もう一度挑戦</button>
          <button class="btn-home" onclick="goHome()">ホームに戻る</button>
        </div>
      </div>
    </div>
  </div>

  <script>
const QUESTIONS_DATA = {
  "version": "2.0",
  "questions": [
    {
      "id": 1,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "Please ______ the document before submitting it to the manager.",
      "choices": [
        "A) review",
        "B) reviews",
        "C) reviewing",
        "D) reviewed"
      ],
      "correctIndex": 0,
      "explanation": "【和訳】マネージャーに提出する前に、その書類を確認してください。\n\nPleaseの後には動詞の原形が続きます。「Please + 動詞の原形」は丁寧な依頼の表現です。",
      "category": "語彙"
    },
    {
      "id": 2,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "The new employee was very ______ about starting her first day at work.",
      "choices": [
        "A) excitement",
        "B) excited",
        "C) excitedly",
        "D) exciting"
      ],
      "correctIndex": 1,
      "explanation": "【和訳】その新入社員は、職場での初日を始めることにとてもわくわくしていました。\n\nbe動詞の後に続く補語として形容詞が必要です。人の感情を表す場合は過去分詞形の形容詞「excited」を使います。",
      "category": "品詞"
    },
    {
      "id": 3,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "The conference will be held ______ March 15th.",
      "choices": [
        "A) in",
        "B) at",
        "C) on",
        "D) by"
      ],
      "correctIndex": 2,
      "explanation": "【和訳】その会議は3月15日に開催されます。\n\n特定の日付の前には前置詞「on」を使います。「in」は月や年、「at」は時刻に使います。",
      "category": "前置詞"
    },
    {
      "id": 4,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "Ms. Tanaka ______ the marketing department for over ten years.",
      "choices": [
        "A) leads",
        "B) has led",
        "C) is leading",
        "D) lead"
      ],
      "correctIndex": 1,
      "explanation": "【和訳】田中さんは10年以上にわたりマーケティング部門を率いています。\n\n「for over ten years（10年以上）」という期間を表す表現があるため、現在完了形「has led」が適切です。",
      "category": "時制"
    },
    {
      "id": 5,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "The office will be closed ______ it is a national holiday.",
      "choices": [
        "A) although",
        "B) because",
        "C) unless",
        "D) while"
      ],
      "correctIndex": 1,
      "explanation": "【和訳】祝日なので、オフィスは閉まります。\n\n「祝日なのでオフィスは閉まります」という因果関係を表すため、理由を示す接続詞「because」が正解です。",
      "category": "接続詞"
    },
    {
      "id": 6,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "Each department must submit ______ budget report by Friday.",
      "choices": [
        "A) it",
        "B) its",
        "C) their",
        "D) them"
      ],
      "correctIndex": 1,
      "explanation": "【和訳】各部門は金曜日までにその予算報告書を提出しなければなりません。\n\n「Each department」は単数扱いなので、所有格の代名詞は「its」が適切です。",
      "category": "代名詞"
    },
    {
      "id": 7,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "All employees are required to ______ the safety training session.",
      "choices": [
        "A) attend",
        "B) produce",
        "C) deliver",
        "D) maintain"
      ],
      "correctIndex": 0,
      "explanation": "【和訳】すべての従業員は安全研修セッションに出席することが求められています。\n\n「安全研修セッションに出席する」という意味で、「attend（出席する）」が最も適切です。",
      "category": "語彙"
    },
    {
      "id": 8,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "The manager spoke ______ to the team about the upcoming changes.",
      "choices": [
        "A) direct",
        "B) direction",
        "C) directly",
        "D) directed"
      ],
      "correctIndex": 2,
      "explanation": "【和訳】マネージャーは今後の変更についてチームに直接話しました。\n\n動詞「spoke」を修飾するには副詞が必要です。「directly（直接的に）」が正解です。",
      "category": "品詞"
    },
    {
      "id": 9,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "The package was delivered ______ the reception desk this morning.",
      "choices": [
        "A) to",
        "B) for",
        "C) with",
        "D) from"
      ],
      "correctIndex": 0,
      "explanation": "【和訳】その荷物は今朝、受付デスクに届けられました。\n\n「deliver to ～（～に届ける）」という組み合わせで、前置詞「to」が正解です。",
      "category": "前置詞"
    },
    {
      "id": 10,
      "part": "Part 5",
      "difficulty": "easy",
      "passage": null,
      "sentence": "We need to find a ______ for the broken printer as soon as possible.",
      "choices": [
        "A) replace",
        "B) replacing",
        "C) replacement",
        "D) replaced"

// ============================================================
// TOEIC Practice App - Main Application Logic
// ============================================================

let allQuestions = [];
let quizQuestions = [];
let currentIndex = 0;
let answers = []; // { questionId, selectedIndex, isCorrect, timeSpent }
let questionStartTime = null;
let lastAnswer = null;
let currentFilter = null;

const PART_INFO = {
  'Part 5': { title: 'Part 5: 短文穴埋め', icon: '📝' },
  'Part 6': { title: 'Part 6: 長文穴埋め', icon: '📄' },
  'Part 7': { title: 'Part 7: 読解問題', icon: '📖' },
};

const DIFFICULTY_LABELS = {
  easy: '初級', medium: '中級', hard: '上級'
};

// ============================================================
// Initialization
// ============================================================

document.addEventListener('DOMContentLoaded', async () => {
  await loadQuestions();
  renderHome();
});


async function loadQuestions() {
  allQuestions = QUESTIONS_DATA.questions;
}

// ============================================================
// Home Screen
// ============================================================

function renderHome() {
  document.getElementById('total-count').textContent = allQuestions.length + '問';

  const container = document.getElementById('part-cards');
  container.innerHTML = '';

  for (const [part, info] of Object.entries(PART_INFO)) {
    const count = allQuestions.filter(q => q.part === part).length;
    const card = document.createElement('button');
    card.className = 'part-card';
    card.onclick = () => startQuiz(part);
    card.innerHTML = `
      <div class="part-icon">${info.icon}</div>
      <div class="part-info">
        <strong>${info.title}</strong>
        <small>${count}問</small>
      </div>
      <span class="part-arrow">›</span>
    `;
    container.appendChild(card);
  }
}

// ============================================================
// Screen Management
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================
// Quiz Logic
// ============================================================

function startQuiz(part, count) {
  let questions = part
    ? allQuestions.filter(q => q.part === part)
    : [...allQuestions];

  // Shuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }

  if (count && count < questions.length) {
    questions = questions.slice(0, count);
  }

  quizQuestions = questions;
  currentIndex = 0;
  answers = [];
  lastAnswer = null;
  currentFilter = part;

  showQuizQuestion();
}

function showQuizQuestion() {
  showScreen('screen-quiz');
  const q = quizQuestions[currentIndex];
  const total = quizQuestions.length;

  // Progress
  const pct = ((currentIndex) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Badges
  document.getElementById('badge-part').textContent = q.part;
  document.getElementById('badge-category').textContent = q.category;

  const diffBadge = document.getElementById('badge-difficulty');
  diffBadge.textContent = DIFFICULTY_LABELS[q.difficulty];
  diffBadge.className = 'badge badge-difficulty ' + q.difficulty;

  // Passage
  const passageArea = document.getElementById('passage-area');
  if (q.passage) {
    passageArea.textContent = q.passage;
    passageArea.classList.add('visible');
  } else {
    passageArea.textContent = '';
    passageArea.classList.remove('visible');
  }

  // Question
  document.getElementById('question-text').textContent = q.sentence;

  // Choices
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => submitAnswer(idx);
    choicesDiv.appendChild(btn);
  });

  // Counter
  document.getElementById('quiz-counter').textContent =
    `Q${currentIndex + 1} / ${total}`;

  questionStartTime = Date.now();
}

function submitAnswer(selectedIndex) {
  const q = quizQuestions[currentIndex];
  const timeSpent = (Date.now() - questionStartTime) / 1000;
  const isCorrect = selectedIndex === q.correctIndex;

  lastAnswer = {
    questionId: q.id,
    selectedIndex,
    isCorrect,
    timeSpent,
  };

  showExplanation();
}

// ============================================================
// Explanation Screen
// ============================================================

function showExplanation() {
  showScreen('screen-explanation');
  const q = quizQuestions[currentIndex];
  const total = quizQuestions.length;
  const a = lastAnswer;

  // Progress
  const pct = ((currentIndex + 1) / total) * 100;
  document.getElementById('progress-fill-exp').style.width = pct + '%';

  // Banner
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner ' + (a.isCorrect ? 'correct' : 'incorrect');
  banner.innerHTML = `
    <span class="banner-icon">${a.isCorrect ? '✅' : '❌'}</span>
    <div class="banner-text">
      <strong>${a.isCorrect ? '正解！' : '不正解'}</strong>
      <small>回答時間: ${a.timeSpent.toFixed(1)}秒</small>
    </div>
  `;

  // Passage
  const passageArea = document.getElementById('exp-passage-area');
  if (q.passage) {
    passageArea.textContent = q.passage;
    passageArea.classList.add('visible');
  } else {
    passageArea.textContent = '';
    passageArea.classList.remove('visible');
  }

  // Question
  document.getElementById('exp-question-text').textContent = q.sentence;

  // Choices with states
  const choicesDiv = document.getElementById('exp-choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    let cls = 'choice-btn';
    let icon = '';

    if (idx === q.correctIndex) {
      cls += ' correct';
      icon = '✓';
    } else if (idx === a.selectedIndex && !a.isCorrect) {
      cls += ' incorrect';
      icon = '✗';
    } else {
      cls += ' dimmed';
    }

    btn.className = cls;
    btn.disabled = true;
    btn.innerHTML = `<span>${choice}</span>${icon ? `<span class="choice-icon">${icon}</span>` : ''}`;
    choicesDiv.appendChild(btn);
  });

  // Explanation
  document.getElementById('explanation-text').textContent = q.explanation;

  // Next button text
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = (currentIndex + 1 < total) ? '次の問題へ' : '結果を見る';
}

function nextQuestion() {
  answers.push(lastAnswer);
  lastAnswer = null;

  if (currentIndex + 1 < quizQuestions.length) {
    currentIndex++;
    showQuizQuestion();
  } else {
    showResult();
  }
}

// ============================================================
// Result Screen
// ============================================================

function showResult() {
  showScreen('screen-result');

  const total = answers.length;
  const correct = answers.filter(a => a.isCorrect).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Score circle
  const ring = document.getElementById('score-ring');
  const circumference = 2 * Math.PI * 52; // r=52
  const offset = circumference * (1 - pct / 100);

  // Color
  let color;
  if (pct >= 80) color = 'var(--green)';
  else if (pct >= 60) color = 'var(--orange)';
  else color = 'var(--red)';

  ring.style.stroke = color;
  // Trigger animation
  setTimeout(() => {
    ring.style.strokeDashoffset = offset;
  }, 100);

  document.getElementById('score-percent').textContent = pct + '%';
  document.getElementById('score-percent').style.color = color;
  document.getElementById('score-fraction').textContent = `${correct} / ${total}`;

  // Message
  let msg;
  if (pct >= 90) msg = '素晴らしい！完璧に近い成績です！';
  else if (pct >= 80) msg = 'よくできました！この調子で頑張りましょう！';
  else if (pct >= 60) msg = 'まずまずの結果です。苦手分野を復習しましょう。';
  else if (pct >= 40) msg = 'もう少し頑張りましょう。基礎から見直してみましょう。';
  else msg = '基礎からしっかり学習しましょう。繰り返し練習が大切です。';
  document.getElementById('score-message').textContent = msg;

  // Stats
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-incorrect').textContent = total - correct;
  document.getElementById('stat-rate').textContent = pct + '%';

  // Part breakdown
  const breakdown = document.getElementById('part-breakdown');
  if (!currentFilter) {
    let html = '<div class="part-breakdown-title">パート別結果</div>';
    for (const part of ['Part 5', 'Part 6', 'Part 7']) {
      const partAnswers = answers.filter(a => {
        const q = quizQuestions.find(q => q.id === a.questionId);
        return q && q.part === part;
      });
      if (partAnswers.length === 0) continue;
      const partCorrect = partAnswers.filter(a => a.isCorrect).length;
      const partPct = Math.round((partCorrect / partAnswers.length) * 100);
      let barColor;
      if (partPct >= 70) barColor = 'var(--green)';
      else if (partPct >= 50) barColor = 'var(--orange)';
      else barColor = 'var(--red)';

      html += `
        <div class="part-result-row">
          <span class="part-result-name">${PART_INFO[part].title}</span>
          <span class="part-result-score">${partCorrect}/${partAnswers.length}</span>
          <div class="part-result-bar">
            <div class="part-result-bar-fill" style="width:${partPct}%; background:${barColor}"></div>
          </div>
        </div>
      `;
    }
    breakdown.innerHTML = html;
  } else {
    breakdown.innerHTML = '';
  }
}

// ============================================================
// Navigation
// ============================================================

function confirmQuit() {
  if (confirm('クイズを終了しますか？進捗は保存されません。')) {
    goHome();
  }
}

function goHome() {
  // Reset score ring for next time
  const ring = document.getElementById('score-ring');
  ring.style.strokeDashoffset = 326.7;
  showScreen('screen-home');
}

function retryQuiz() {
  // Reset ring
  const ring = document.getElementById('score-ring');
  ring.style.strokeDashoffset = 326.7;

  // Reshuffle same questions
  for (let i = quizQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizQuestions[i], quizQuestions[j]] = [quizQuestions[j], quizQuestions[i]];
  }
  currentIndex = 0;
  answers = [];
  lastAnswer = null;
  showQuizQuestion();
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW registration failed:', err));
  });
}
